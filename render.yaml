services:
  - type: web
    name: yojan-ai
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt && pip install "pipecat-ai[silero,websocket]" sarvamai groq && python -c "import nltk; nltk.download('stopwords')"
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: PINECONE_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: GROQ_API_KEYS
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: CARTESIA_API_KEY
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: RUMIK_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
